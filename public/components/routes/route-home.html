<source src="@com/example-run.html">

<example-run
  #each="i in 7"
  :name="'route-home-' + `${i+1}`.padStart(2, '0')"
></example-run>


<template u-com="route-home-01">
  This is a component
</template>



<template u-com="route-home-02">
  <header id="myheader">Element IDs are sandboxed via Shadowdom.</header>
  <main>Use semantic html tags for clean CSS.</main>

  <style>
    :host {
      color: #2c2c2c;
    }
    #myheader {
      font-size: 1.2rem;
    }
    main {
      color: green;
    }
  </style>
</template>



<template u-com="route-home-03">
  You can export a superclass of <code>HTMLElement</code>, or export the standard custom element callbacks;
  <br>
  <code>attributeChangedCallback</code>, <code>connectedCallback</code> and <code>disconnectedCallback</code>.
  <br>
  Exported functions will be seamlessly attached to the prototype of the custom element.

  <script>
    export default class extends HTMLElement {
      connectedCallback() {
        console.log('My component was added to the DOM.')
      }

      disconnectedCallback() {
        console.log('My component was removed from the DOM.')
      }
    }

    export function attributeChangedCallback(name, oldValue, newValue) {
      console.log(`Attribute ${name}, ${oldValue}, ${newValue}`)
    }
  </script>

  <style>
    code {
      color: rgb(52, 61, 88);
      background-color: rgba(201, 199, 199, 0.3);
      border: 1px solid #e1e1e1;
      padding: 0px 3px 0px 0px;
    }
  </style>
</template>



<template u-com="route-home-04">
  <meta $count=0>

  <!-- Create a calculated field -->
  <meta $oddeven.calc="() => count % 2 === 0 ? 'even' : 'odd'">

  <nav>
    <!-- Simple event handlers -->
    <button @click="count--">Less</button>
    <button @click="count++">More</button>
  </nav>

  <main>
    <div>Count: <meta %count></div>
    <div>Number is: <meta %oddeven></div>
  </main>

  <style>
    nav {
      margin-bottom: 10px;
    }
  </style>
</template>



<template u-com="route-home-05">
  <!-- Use a persistent store variable for reactive local storage. -->
  <meta $count.save=0>

  You've loaded this component <meta %count></span> time(s).

  <script>
    export function connectedCallback() {
      this.$effect(() => this.$data.count++)
    }
  </script>

  <style>
    :host {
      font-size: 1.1rem;
      margin: 0.3rem 0 0.3rem 0;
    }
  </style>
</template>



<template u-com="route-home-06">
  <meta $--color1="'violet'">
  <div class="one"><meta %color1> one</div>

  <meta $color-var-two="'green'">
  <meta --color-two="colorVarTwo">
  <div class="two"><meta %color-var-two> two</div>

  <section>
    <meta $--color="'blue'" %color> three
  </section>

  <style>
    .one {
      color: var(--color1);
    }
    .two {
      color: var(--color-two);
    }
    section {
      color: var(--color)
    }
  </style>
</template>
